<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- キャッシュクリア -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>入試問題データベース</title>

  <!-- iOS ホーム画面アイコン / Web App -->
  <link rel="apple-touch-icon" href="/DB1.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/DB1.png" />
  <link rel="apple-touch-icon-precomposed" href="/DB1.png" />
  <link rel="icon" type="image/png" href="/DB1.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="入試DB" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/main.css?v=20260612al" />
</head>
<body>
  <!-- ===== Topbar ===== -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div>
          <div class="brand-title" id="site-title">入試問題データベース</div>
          <div class="brand-sub" id="site-subtitle">Entrance Exam Database</div>
        </div>
      </div>
      <div class="topbar-spacer"></div>
      <button class="icon-btn" id="btn-open-search" title="検索"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>
  </header>

  <main class="shell">
    <!-- ===== タブ（タイトル下・横スクロール） ===== -->
    <nav class="tabs" id="main-tabs"></nav>

    <!-- ===== タブ1: 通常検索 ===== -->
    <section data-panel="search" class="panel active">
      <div class="toolbar">
        <button class="btn primary" id="btn-open-search-2"><i class="fa-solid fa-magnifying-glass"></i> 検索</button>
        <span class="hint" id="filter-summary">すべての入試問題を表示中</span>
        <span class="spacer"></span>
        <button class="btn ghost sm" id="btn-clear-filter"><i class="fa-solid fa-rotate-left"></i> 条件クリア</button>
      </div>
      <div id="results-area"></div>
    </section>

    <!-- ===== タブ2: コーパス検索 ===== -->
    <section data-panel="corpus" class="panel">
      <div class="card">
        <div class="card-head">
          <h3><i class="fa-solid fa-language ic"></i> コーパス分析設定</h3>
          <span class="spacer"></span>
          <button class="icon-btn" id="btn-corpus-filter" title="対象を絞り込み"><i class="fa-solid fa-filter"></i></button>
          <button class="icon-btn primary" id="btn-run-corpus" title="分析実行"><i class="fa-solid fa-play"></i></button>
        </div>
        <div class="grid-3">
          <label class="field">
            <span class="field-label"><i class="fa-solid fa-magnifying-glass-chart"></i> 検索語（KWIC / 頻度ハイライト）</span>
            <input type="text" id="corpus-word" placeholder="例: immune" />
          </label>
          <label class="field">
            <span class="field-label"><i class="fa-solid fa-ban"></i> ストップワードリスト</span>
            <select id="corpus-stopword"></select>
          </label>
          <label class="field">
            <span class="field-label"><i class="fa-solid fa-list-check"></i> 語彙リスト（カバー率）</span>
            <select id="corpus-vocab"></select>
          </label>
          <label class="field">
            <span class="field-label"><i class="fa-solid fa-layer-group"></i> レベル別語彙リスト（CEFR分析）</span>
            <select id="corpus-level"></select>
          </label>
        </div>
        <p class="hint" style="margin-top:10px"><i class="fa-solid fa-circle-info"></i> 対象は登録済み入試問題の英文テキスト（問題・解答・解説）です。記法は自動で除去されます。</p>
        <p class="hint" id="corpus-filter-summary" style="margin-top:6px"><i class="fa-solid fa-filter"></i> 対象: すべての入試問題</p>
      </div>
      <div id="corpus-results"></div>
    </section>
  </main>

  <!-- ===== 検索モーダル ===== -->
  <div class="modal-overlay" id="search-modal">
    <div class="modal">
      <div class="modal-head">
        <i class="fa-solid fa-magnifying-glass ic"></i>
        <h3>入試問題を検索</h3>
        <span class="spacer"></span>
        <button class="icon-btn" data-close title="閉じる"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <nav class="tabs" id="search-modal-tabs">
          <button class="tab active" data-mtab="normal"><i class="fa-solid fa-sliders"></i><span>条件で検索</span></button>
          <button class="tab" data-mtab="keyword"><i class="fa-solid fa-key"></i><span>キーワード検索</span></button>
        </nav>

        <div data-mpanel="normal">
          <div class="grid-2">
            <label class="field"><span class="field-label">年度</span><select id="sm-year"><option value="">指定なし</option></select></label>
            <label class="field"><span class="field-label">大学名</span><select id="sm-university"><option value="">指定なし</option></select></label>
            <label class="field"><span class="field-label">方式</span><select id="sm-schedule"><option value="">指定なし</option></select></label>
            <label class="field"><span class="field-label">大問番号</span><input type="number" id="sm-qnum" min="1" placeholder="例: 1" /></label>
            <label class="field"><span class="field-label">問題種別</span><select id="sm-category"><option value="">指定なし</option></select></label>
          </div>
        </div>

        <div data-mpanel="keyword" style="display:none">
          <label class="field">
            <span class="field-label">キーワード（問題・解答・解説の本文を全文検索）</span>
            <input type="text" id="sm-word" placeholder="例: immune system" />
          </label>
          <p class="hint" style="margin-top:8px"><i class="fa-solid fa-circle-info"></i> 出現回数の多い順に並びます。条件タブの絞り込みと併用できます。</p>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn ghost" data-close>キャンセル</button>
        <button class="btn primary" id="sm-run"><i class="fa-solid fa-magnifying-glass"></i> 検索</button>
      </div>
    </div>
  </div>

  <!-- ===== コーパス対象絞り込みモーダル ===== -->
  <div class="modal-overlay" id="corpus-filter-modal">
    <div class="modal">
      <div class="modal-head">
        <i class="fa-solid fa-filter ic"></i>
        <h3>コーパス分析の対象を絞り込み</h3>
        <span class="spacer"></span>
        <button class="icon-btn" data-close title="閉じる"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body" id="corpus-filter-body"></div>
      <div class="modal-foot">
        <button class="icon-btn" id="cf-reset" title="すべて選択"><i class="fa-solid fa-rotate-left"></i></button>
        <span class="spacer"></span>
        <button class="icon-btn" data-close title="キャンセル"><i class="fa-solid fa-xmark"></i></button>
        <button class="icon-btn primary" id="cf-apply" title="適用"><i class="fa-solid fa-check"></i></button>
      </div>
    </div>
  </div>

  <!-- ===== レベル別語彙 詳細モーダル ===== -->
  <div class="modal-overlay" id="level-detail-modal">
    <div class="modal">
      <div class="modal-head">
        <i class="fa-solid fa-layer-group ic"></i>
        <h3 id="level-detail-title">レベル別語彙</h3>
        <span class="spacer"></span>
        <button class="icon-btn" data-close title="閉じる"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body" id="level-detail-body"></div>
    </div>
  </div>

  <!-- ===== 入試問題 表示モーダル ===== -->
  <div class="modal-overlay" id="exam-modal">
    <div class="modal wide">
      <div class="modal-head">
        <i class="fa-solid fa-file-lines ic"></i>
        <h3 id="exam-modal-title">入試問題</h3>
        <span class="spacer"></span>
        <button class="icon-btn" id="exam-fontsize" title="文字サイズ変更"><i class="fa-solid fa-text-height"></i></button>
        <button class="icon-btn" id="exam-copy" title="コピー"><i class="fa-solid fa-copy"></i></button>
        <button class="icon-btn" id="exam-print" title="印刷"><i class="fa-solid fa-print"></i></button>
        <button class="icon-btn" data-close title="閉じる"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body" id="exam-modal-body"></div>
      <div class="modal-foot" id="exam-modal-foot">
        <button class="icon-btn" id="exam-prev" title="前の大問"><i class="fa-solid fa-angle-left"></i></button>
        <span id="exam-nav-label"></span>
        <button class="icon-btn" id="exam-next" title="次の大問"><i class="fa-solid fa-angle-right"></i></button>
        <span class="spacer"></span>
        <button class="icon-btn" id="exam-show-all" title="全ての問題を表示"><i class="fa-solid fa-arrow-up-right-from-square"></i></button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="assets/data/oxford5000.js?v=20260612a"></script>
  <script src="assets/js/store.js?v=20260612ao"></script>
  <script src="assets/js/api.js?v=20260612ao"></script>
  <script src="assets/js/ui.js?v=20260612z"></script>
  <script src="assets/js/markup.js?v=20260612ai"></script>
  <script src="assets/js/corpus.js?v=20260612ap"></script>
  <script src="assets/js/viewer.js?v=20260612ao"></script>
</body>
</html>
