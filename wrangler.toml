name = "medical-exam-worker"
main = "worker/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "medical-exam-db"
database_id = "YOUR_D1_DATABASE_ID"

# Pages project configuration
[env.production]
name = "medical-exam-worker-production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "medical-exam-db"
database_id = "YOUR_D1_DATABASE_ID"

# Local development
[dev]
port = 8787
local_protocol = "http"
