name = "medical-exam-worker"
main = "worker/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 database binding — update database_id after creating via:
#   wrangler d1 create medical-exam-db
[[d1_databases]]
binding = "DB"
database_name = "medical-exam-db"
database_id = "YOUR_D1_DATABASE_ID"

[dev]
port = 8787
local_protocol = "http"
